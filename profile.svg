      .subtitle { font-size: 16px; fill: #9fb0c3; }
      .label { font-size: 13px; fill: #8b949e; letter-spacing: 0.12em; }
      .body { font-size: 15px; fill: #c9d1d9; }
      .small { font-size: 13px; fill: #c9d1d9; }
      .accent { fill: #58a6ff; }
      .accent2 { fill: #ffa657; }
      .panel { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .chip { fill: rgba(88,166,255,0.10); stroke: rgba(88,166,255,0.25); stroke-width: 1; }
      .chip2 { fill: rgba(155,92,255,0.10); stroke: rgba(155,92,255,0.25); stroke-width: 1; }
      .grid { stroke: rgba(255,255,255,0.04); stroke-width: 1; }
