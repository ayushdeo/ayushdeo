<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .mono { font-family: Consolas, Menlo, Monaco, "SFMono-Regular", monospace; }
      .title { font-size: 30px; font-weight: 700; fill: #d7e2ee; }
      .sub { font-size: 14px; fill: #9fb0c3; }
      .txt { font-size: 13px; fill: #c9d1d9; }
      .small { font-size: 12px; fill: #c9d1d9; }
      .dim { fill: #7d8590; }
      .accent { fill: #58a6ff; }
      .accent2 { fill: #ffa657; }
      .terminal { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .chip { fill: rgba(88,166,255,0.08); stroke: rgba(88,166,255,0.22); stroke-width: 1; }
      .line { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="672" rx="20" class="terminal"/>

  <!-- terminal bar -->
  <rect x="24" y="24" width="1152" height="44" rx="20" fill="rgba(255,255,255,0.02)"/>
  <circle cx="52" cy="46" r="6" fill="#ff5f56"/>
  <circle cx="74" cy="46" r="6" fill="#ffbd2e"/>
  <circle cx="96" cy="46" r="6" fill="#27c93f"/>
  <text x="132" y="50" class="mono small dim">ayush@deo:~/profile$</text>

  <text x="54" y="102" class="mono title">Ayush Deo</text>
  <text x="54" y="126" class="mono sub">AI Researcher | Agentic Systems | LLMs | Gene Sequencing AI | Graphic Design</text>
  <line x1="54" y1="146" x2="1148" y2="146" class="line"/>

