  <text x="18" y="342" class="mono small dim">┌──────────────────────────────┐</text>
  <text x="18" y="362" class="mono small">│  style: terminal / text-first │</text>
  <text x="18" y="382" class="mono small">│  vibe: research + design      │</text>
  <text x="18" y="402" class="mono small">│  mode: dark only              │</text>
  <text x="18" y="422" class="mono small dim">└──────────────────────────────┘</text>
</g>

  <!-- right terminal content -->
  <g transform="translate(410,170)">
    <text x="0" y="0" class="mono txt dim">$ whoami</text>
    <text x="0" y="22" class="mono txt">Ayush Deo — USC M.S. CS</text>
    <text x="0" y="44" class="mono txt">Researcher focused on LLMs, evaluation, and agentic workflows.</text>
    <text x="0" y="66" class="mono txt">I also build systems for gene sequencing AI and visual design.</text>

    <line x1="0" y1="88" x2="670" y2="88" class="line"/>

    <text x="0" y="118" class="mono txt dim">$ cat education.txt</text>
    <text x="0" y="140" class="mono txt">University of Southern California</text>
    <text x="0" y="160" class="mono small">M.S. Computer Science · 2025–2027</text>
    <text x="0" y="182" class="mono txt">NMIMS Mukesh Patel School of Technology</text>
    <text x="0" y="202" class="mono small">B.Tech. Information Technology · CGPA 3.62/4.0</text>

    <text x="0" y="240" class="mono txt dim">$ cat research.txt</text>
    <text x="0" y="262" class="mono txt">6 published papers</text>
    <text x="0" y="282" class="mono small">Vision-language captioning · GPT-4o-mini bias analysis</text>
    <text x="0" y="304" class="mono small">LLM evaluation · multimodal systems · bioinformatics AI</text>

    <text x="0" y="342" class="mono txt dim">$ cat experience.txt</text>
    <text x="0" y="364" class="mono txt">TCS · AI/ML Intern, Cloud.AI Division</text>
    <text x="0" y="384" class="mono small">Built 7-agent automation, hybrid reasoning, and RAG pipelines.</text>
    <text x="0" y="406" class="mono txt">Bellevidco · Co-Founder</text>
    <text x="0" y="426" class="mono small">Scaled a data-driven consultancy with analytics systems.</text>

    <text x="0" y="464" class="mono txt dim">$ cat stack.txt</text>
    <text x="0" y="486" class="mono txt">Python | SQL | TypeScript | C++ | PyTorch | Hugging Face</text>
    <text x="0" y="508" class="mono txt">Azure AI | AutoGen | Docker | React | NLP | RAG</text>

    <text x="0" y="546" class="mono txt dim">$ cat contact.txt</text>
    <text x="0" y="568" class="mono txt">theayushdeo@gmail.com</text>
    <text x="230" y="568" class="mono txt">linkedin.com/in/ayushdeo</text>
