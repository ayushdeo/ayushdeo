    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#9b5cff"/>
    </linearGradient>
    <style>
      .mono { font-family: Consolas, Menlo, Monaco, "SFMono-Regular", monospace; }
      .title { font-size: 34px; font-weight: 700; fill: #e6edf3; }
      .sub { font-size: 14px; fill: #9fb0c3; }
      .label { font-size: 11px; letter-spacing: 0.16em; fill: #8b949e; }
      .body { font-size: 13px; fill: #c9d1d9; }
      .small { font-size: 12px; fill: #c9d1d9; }
      .muted { font-size: 12px; fill: #7d8590; }
      .panel { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .chip { fill: rgba(88,166,255,0.08); stroke: rgba(88,166,255,0.22); stroke-width: 1; }
      .chip2 { fill: rgba(155,92,255,0.10); stroke: rgba(155,92,255,0.22); stroke-width: 1; }
      .line { stroke: rgba(255,255,255,0.05); stroke-width: 1; }
      .key { fill: #ffa657; }
      .value { fill: #e6edf3; }
    </style>
